name: CI
on:
  push: { branches: [main] }
  pull_request:
permissions: { contents: read }
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run guard:project
      - run: npm run guard:firebase
      - run: npm run guard:security
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: CONTENT_PHASE=final npm run validate:content
      - run: npm run build
      - run: npm run analyze:bundle
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run test:responsive
      - run: npm run test:offline
      - name: Validate PWA assets
        run: test -f dist/manifest.webmanifest && test -f dist/sw.js && grep -q 'standalone' dist/manifest.webmanifest
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - run: npm ci
      - run: npx firebase emulators:exec --only firestore,storage --project demo-english-circuit "npm run test:firestore-rules"

