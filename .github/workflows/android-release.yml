name: Android release candidate
on:
  push: { tags: ['v*'] }
permissions: { contents: write }
jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      CONTENT_PHASE: final
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: gradle }
      - run: npm ci && npm run guard:security && npm run guard:release && npm run build && npx cap sync android
      - name: Materialize signing files
        env:
          KEYSTORE: ${{ secrets.ENGLISH_ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ENGLISH_ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ENGLISH_ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ENGLISH_ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE" && test -n "$STORE_PASSWORD" && test -n "$KEY_ALIAS" && test -n "$KEY_PASSWORD"
          printf '%s' "$KEYSTORE" | base64 --decode > android/release.jks
          printf 'storeFile=release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > android/keystore.properties
      - run: ./gradlew clean lint test assembleRelease bundleRelease --no-daemon
        working-directory: android
      - name: Prepare public release artifacts and checksums
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/release/app-release.apk "release/english-circuit-${GITHUB_REF_NAME}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "release/english-circuit-${GITHUB_REF_NAME}.aab"
          cd release
          sha256sum "english-circuit-${GITHUB_REF_NAME}.apk" "english-circuit-${GITHUB_REF_NAME}.aab" > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          name: English Circuit ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            Primera versión pública de English Circuit.

            - 24 semanas.
            - 72 lecciones.
            - Inglés cotidiano, profesional y técnico.
            - Modo offline.
            - Sincronización Firebase.
            - PWA.
            - Teléfonos y tabletas Android.
            - Orientación vertical y horizontal.
          files: release/*
      - name: Remove temporary signing files
        if: always()
        run: rm -f android/release.jks android/keystore.properties
